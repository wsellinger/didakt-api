services:
  redis:
    image: redis
    ports:
      - "6379:6379"

  didakt.api.leaderboard:
    build:
      context: ./Didakt.Api.Leaderboard
      dockerfile: Dockerfile
    ports:
      - "5223:8080"
    environment:
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      - redis

  didakt.api.auth:
    build:
      context: ./Didakt.Api.Auth
      dockerfile: Dockerfile
    ports:
      - "5224:8080"